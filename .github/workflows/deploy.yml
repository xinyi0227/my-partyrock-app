name: Deploy AI Music Learning Companion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build SAM application
        run: sam build --template infra/template.yaml

      - name: Deploy SAM application
        run: |
          sam deploy \
            --stack-name ai-music-learning-companion \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ap-southeast-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Get CloudFormation outputs
        id: get-outputs
        run: |
          # Helper function to get CloudFormation output
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name ai-music-learning-companion \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }
          
          echo "LEARNING_PATH_URL=$(get_output PersonalizedLearningPathUrl)" >> $GITHUB_ENV
          echo "COACH_URL=$(get_output AIMusicCoachUrl)" >> $GITHUB_ENV
          echo "BUCKET_NAME=$(get_output BucketName)" >> $GITHUB_ENV

      - name: Inject URLs into frontend
        run: |
          sed -i "s|__URL_PERSONALIZED_LEARNING_PATH__|$LEARNING_PATH_URL|g" frontend/index.html
          sed -i "s|__URL_AI_MUSIC_COACH__|$COACH_URL|g" frontend/index.html

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/ s3://$BUCKET_NAME/ --cache-control no-cache --delete

      - name: Output website URL
        run: |
          WEBSITE_URL=$(aws cloudformation describe-stacks \
            --stack-name ai-music-learning-companion \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteUrl'].OutputValue" \
            --output text)
          echo "🎵 AI Music Learning Companion deployed successfully!"
          echo "Website URL: $WEBSITE_URL"
