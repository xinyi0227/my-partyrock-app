<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Calculator Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-emerald-400">Financial Calculator</h2>
        
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Calculation Type</label>
            <select id="type" onchange="toggleFields()" class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-emerald-500">
                <option value="compound">Compound Interest</option>
                <option value="emi">Loan EMI</option>
            </select>
        </div>

        <div class="space-y-4">
            <div>
                <label id="principal-label" class="block text-sm font-medium mb-1">Principal Amount ($)</label>
                <input type="number" id="principal" value="10000" class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Annual Interest Rate (%)</label>
                <input type="number" step="0.1" id="rate" value="5" class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Period (Years)</label>
                <input type="number" id="time" value="5" class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-emerald-500">
            </div>
            <div id="frequency-container">
                <label class="block text-sm font-medium mb-1">Compounding Frequency</label>
                <select id="frequency" class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-emerald-500">
                    <option value="1">Annually (1/yr)</option>
                    <option value="4">Quarterly (4/yr)</option>
                    <option value="12">Monthly (12/yr)</option>
                </select>
            </div>
        </div>

        <button onclick="calculate()" class="w-full mt-6 bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold p-3 rounded transition duration-200">
            Calculate
        </button>

        <div id="results" class="mt-6 p-4 bg-slate-700/50 rounded-lg hidden border border-slate-600">
            <h3 class="font-semibold text-emerald-400 mb-2">Results:</h3>
            <div id="results-output" class="space-y-1 text-sm font-mono"></div>
        </div>
    </div>

    <script>
        // REPLACE THIS URL with your SAM CLI generated Endpoint Output
        const API_ENDPOINT = 'https://YOUR_API_GATEWAY_ID.execute-api.us-east-1.amazonaws.com/Prod/calculate';

        function toggleFields() {
            const type = document.getElementById('type').value;
            const freqContainer = document.getElementById('frequency-container');
            const principalLabel = document.getElementById('principal-label');
            
            if (type === 'emi') {
                freqContainer.classList.add('hidden');
                principalLabel.innerText = "Loan Amount ($)";
            } else {
                freqContainer.classList.remove('hidden');
                principalLabel.innerText = "Principal Amount ($)";
            }
        }

        async function calculate() {
            const type = document.getElementById('type').value;
            const principal = document.getElementById('principal').value;
            const rate = document.getElementById('rate').value;
            const time = document.getElementById('time').value;
            const frequency = document.getElementById('frequency').value;

            const payload = { type, principal, rate, time };
            if (type === 'compound') {
                payload.compounding_frequency = frequency;
            }

            const resultsDiv = document.getElementById('results');
            const outputDiv = document.getElementById('results-output');

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || 'API Error');

                let html = '';
                for (const [key, val] of Object.entries(data)) {
                    const formattedKey = key.replace(/_/g, ' ').toUpperCase();
                    html += `<div class="flex justify-between"><span>${formattedKey}:</span><span class="text-white font-bold">$${val}</span></div>`;
                }
                
                outputDiv.innerHTML = html;
                resultsDiv.classList.remove('hidden');
            } catch (err) {
                outputDiv.innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
                resultsDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
